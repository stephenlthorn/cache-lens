<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CacheLens</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>CacheLens</h1>
      <button id="loadExample" class="secondary">Load example</button>
    </header>

    <section id="inputView">
      <textarea id="input" placeholder="Paste a prompt, prompt chain, or JSON trace..."></textarea>
      <div class="row">
        <button id="analyze" class="primary" disabled>Analyze →</button>
      </div>
      <p class="hint">Supports raw text, messages arrays, and multi-call traces (JSON).</p>
    </section>

    <section id="resultsView" class="hidden">
      <button id="newAnalysis" class="secondary">← New analysis</button>
      <pre id="results"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
